map $sent_http_content_type $expires {
    default                     off;

    ~*^text/html                epoch;
    ~*^text/css                 max;
    ~*^application/javascript   max;
    ~*^text/javascript          max;

    ~*^image/svg\+xml           max;
    ~*^image/x-icon             max;
    ~*^image/png                max;
    ~*^image/jpeg               max;
    ~*^image/gif                max;
    ~*^image/bmp                max;

    ~*^font/ttf                 max;
    ~*^font/woff                max;
    ~*^font/otf                 max;
    ~*^font/woff2               max;
    ~*^application/vnd\.ms-fontobject max;
}

server {
    listen       80;
    server_name  localhost;

    charset utf-8;

    charset_types
        text/html
        text/css
        text/plain
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    set $csp_nonce $request_id;

    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self';
        style-src 'self' 'nonce-$csp_nonce';
        img-src 'self' data:;
        font-src 'self';
        connect-src 'self' http: https:;
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'self';
    ";

    location / {
        root   /usr/share/nginx/html;
        index  index.html;

        sub_filter '</head>' '<meta name="csp-nonce" content="$csp_nonce"></head>';

        expires $expires;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
