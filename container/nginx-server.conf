map $sent_http_content_type $expires {
    default                     off;

    ~*^text/html                epoch;
    ~*^text/css                 max;
    ~*^application/javascript   max;
    ~*^text/javascript          max;

    ~*^image/svg\+xml           max;
    ~*^image/x-icon             max;
    ~*^image/png                max;
    ~*^image/jpeg               max;
    ~*^image/gif                max;
    ~*^image/bmp                max;

    ~*^font/ttf                 max;
    ~*^font/woff                max;
    ~*^font/otf                 max;
    ~*^font/woff2               max;
    ~*^application/vnd\.ms-fontobject max;
}

server {
    listen       80;
    server_name  localhost;

    charset utf-8;

    charset_types
        text/html
        text/css
        text/plain
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        expires $expires;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
